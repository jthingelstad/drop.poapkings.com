AWSTemplateFormatVersion: "2010-09-09"
Description: Elixir Drop API

Parameters:
  CodeBucket:
    Type: String
  CodeKey:
    Type: String
  SessionSecret:
    Type: String
    NoEcho: true
  FastmailJmapToken:
    Type: String
    NoEcho: true
  DiscordWebhookUrl:
    Type: String
    NoEcho: true
  AppUrl:
    Type: String
    Default: https://drop.poapkings.com
  EmailFrom:
    Type: String
    Default: elixir@poapkings.com
  NameModelId:
    Type: String
    Default: amazon.nova-micro-v1:0
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: https://drop.poapkings.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173

Resources:
  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: elixir-drop
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  CrRequestDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-requests-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  CrRequestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-requests
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 60
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CrRequestDeadLetterQueue.Arn
        maxReceiveCount: 5

  CrResultDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-results-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  CrResultQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-results
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 180
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CrResultDeadLetterQueue.Arn
        maxReceiveCount: 5

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: elixir-drop-api-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: elixir-drop-api-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt DataTable.Arn
                  - !Sub "${DataTable.Arn}/index/*"
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt CrRequestQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt CrResultQueue.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: elixir-drop-api
      Description: Elixir Drop authentication, profiles, runs, and leaderboards
      Architectures:
        - arm64
      Runtime: nodejs24.x
      Handler: handler.handler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 512
      Timeout: 20
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          SESSION_SECRET: !Ref SessionSecret
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          APP_URL: !Ref AppUrl
          ELIXIR_DROP_EMAIL_FROM: !Ref EmailFrom
          ELIXIR_DROP_EMAIL_FROM_NAME: Elixir Drop
          NAME_MODEL_ID: !Ref NameModelId
          ELIXIR_DROP_DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          CR_REQUEST_QUEUE_URL: !Ref CrRequestQueue

  CrResultFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: elixir-drop-cr-results
      Description: Stores normalized Clash Royale player results from the fixed-IP bridge
      Architectures:
        - arm64
      Runtime: nodejs24.x
      Handler: handler.crResultHandler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 256
      Timeout: 20
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          SESSION_SECRET: !Ref SessionSecret
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          APP_URL: !Ref AppUrl
          ELIXIR_DROP_EMAIL_FROM: !Ref EmailFrom
          ELIXIR_DROP_EMAIL_FROM_NAME: Elixir Drop
          NAME_MODEL_ID: !Ref NameModelId
          ELIXIR_DROP_DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          CR_REQUEST_QUEUE_URL: !Ref CrRequestQueue

  CrResultEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt CrResultQueue.Arn
      FunctionName: !Ref CrResultFunction
      BatchSize: 10
      FunctionResponseTypes:
        - ReportBatchItemFailures

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: elixir-drop-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
        MaxAge: 86400

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: "2.0"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub integrations/${ApiIntegration}

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

Outputs:
  ApiUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
  TableName:
    Value: !Ref DataTable
  FunctionName:
    Value: !Ref ApiFunction
  CrRequestQueueUrl:
    Value: !Ref CrRequestQueue
  CrResultQueueUrl:
    Value: !Ref CrResultQueue
