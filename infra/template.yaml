AWSTemplateFormatVersion: "2010-09-09"
Description: Elixir Drop API

Parameters:
  CodeBucket:
    Type: String
  CodeKey:
    Type: String
  SessionSecret:
    Type: String
    NoEcho: true
  TelemetryPepper:
    Type: String
    NoEcho: true
    Description: Server-only pepper for referee connection-correlation HMACs. Lambda env only; never exposed to the referee scripts, referee role, CI, or the browser.
  FastmailJmapToken:
    Type: String
    NoEcho: true
  DiscordWebhookUrl:
    Type: String
    NoEcho: true
  AppUrl:
    Type: String
    Default: https://drop.poapkings.com
  EmailFrom:
    Type: String
    Default: elixir@poapkings.com
  AlarmEmail:
    Type: String
    Default: elixir@poapkings.com
  MailCanaryEmail:
    Type: String
    Default: elixir@poapkings.com
  NameModelId:
    Type: String
    Default: us.anthropic.claude-haiku-4-5-20251001-v1:0
  WebVersion:
    Type: String
    Default: ""
    Description: Current front-end build id (git sha); the API reports it so stale tabs can prompt a reload.
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: https://drop.poapkings.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173

Resources:
  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: elixir-drop
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: playerId
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Sparse tag-cluster index: only tagged PROFILE items carry GSI2 keys
        # (GSI2PK = "TAGGED", GSI2SK = "{normalizedPlayerTag}#{playerId}"), so
        # referee-tags can group accounts by tag without a table scan. A single
        # "TAGGED" partition is fine at beta scale. Projects only the
        # pseudonymous playerId — never sub or email.
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - playerId
        # Public player lookup by the pseudonymous profile UUID. Only public
        # profile fields are projected beyond DynamoDB's internal base keys;
        # email stays off-index and no storage key crosses the API boundary.
        - IndexName: GSI3
          KeySchema:
            - AttributeName: playerId
              KeyType: HASH
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - publicName
              - favoriteCardId
              - playerTag
              - totalGames
              - xp
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  CrRequestDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-requests-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  CrRequestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-requests
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 60
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CrRequestDeadLetterQueue.Arn
        maxReceiveCount: 5

  CrResultDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-results-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  CrResultQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: elixir-drop-cr-results
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 180
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CrResultDeadLetterQueue.Arn
        maxReceiveCount: 5

  CrBridgeHeartbeatPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: elixir-drop-cr-bridge-heartbeat
      Users:
        - elixir-drop-cr-bridge
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: cloudwatch:PutMetricData
            Resource: "*"
            Condition:
              StringEquals:
                cloudwatch:namespace: ElixirDrop/CRBridge

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: elixir-drop-alarms
      DisplayName: Elixir Drop Alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /elixir-drop/api
      RetentionInDays: 30

  CrResultLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /elixir-drop/cr-results
      RetentionInDays: 30

  MailCanaryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /elixir-drop/mail-canary
      RetentionInDays: 30

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: elixir-drop-api-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: elixir-drop-api-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Both Lambdas are pinned to managed log groups via
              # LoggingConfig, so no CreateLogGroup and no wildcard resource.
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt ApiLogGroup.Arn
                  - !GetAtt CrResultLogGroup.Arn
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt DataTable.Arn
                  - !Sub "${DataTable.Arn}/index/*"
              # Scoped to the configured Haiku inference profile plus the
              # Anthropic foundation models it routes to — not Resource: "*".
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${NameModelId}
                  - !Sub arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.*
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt CrRequestQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt CrResultQueue.Arn

  MailCanaryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: elixir-drop-mail-canary-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: elixir-drop-mail-canary-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt MailCanaryLogGroup.Arn

  # Referee identity for evidence review and reversible run judgments. It reads
  # the canonical evidence surface and may write only REFEREE# decision
  # partitions; it cannot alter players, runs, scores, evidence, or leaderboard
  # index rows, and has NO access to any secret (the pepper is Lambda-only).
  # The physical name is retained for compatibility with the managed host's
  # existing AWS profile even though the role is no longer strictly read-only.
  RefereeReadRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: elixir-drop-referee-read
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: elixir-drop-referee-bounded
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt DataTable.Arn
                  - !Sub "${DataTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:TransactWriteItems
                Resource: !GetAtt DataTable.Arn
                Condition:
                  ForAllValues:StringLike:
                    dynamodb:LeadingKeys:
                      - REFEREE#*

  # Narrow write identity for leaderboard projection repair. It may scan the
  # table and update only the sparse GSI attributes on PLAYER# items; canonical
  # runs, scores, profiles, XP, and referee evidence are outside its attribute
  # allowlist. The deploy user assumes it explicitly for dry-run-first scripts.
  LeaderboardMaintenanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: elixir-drop-leaderboard-maintenance
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:user/elixir-drop
            Action: sts:AssumeRole
      Policies:
        - PolicyName: elixir-drop-leaderboard-maintenance
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:Scan
                Resource: !GetAtt DataTable.Arn
              - Effect: Allow
                Action: dynamodb:UpdateItem
                Resource: !GetAtt DataTable.Arn
                Condition:
                  ForAllValues:StringLike:
                    dynamodb:LeadingKeys:
                      - PLAYER#*
                  ForAllValues:StringEquals:
                    dynamodb:Attributes:
                      - pk
                      - sk
                      - GSI1PK
                      - GSI1SK

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: elixir-drop-api
      Description: Elixir Drop authentication, profiles, runs, and leaderboards
      Architectures:
        - arm64
      Runtime: nodejs24.x
      Handler: handler.handler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 512
      Timeout: 20
      # Caps concurrent spend if something hammers the API past the stage
      # throttle; generous for beta-scale traffic.
      ReservedConcurrentExecutions: 25
      LoggingConfig:
        ApplicationLogLevel: INFO
        LogFormat: JSON
        LogGroup: !Ref ApiLogGroup
        SystemLogLevel: INFO
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          SESSION_SECRET: !Ref SessionSecret
          TELEMETRY_PEPPER: !Ref TelemetryPepper
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          APP_URL: !Ref AppUrl
          ELIXIR_DROP_EMAIL_FROM: !Ref EmailFrom
          ELIXIR_DROP_EMAIL_FROM_NAME: Elixir Drop
          NAME_MODEL_ID: !Ref NameModelId
          ELIXIR_DROP_DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          CR_REQUEST_QUEUE_URL: !Ref CrRequestQueue
          WEB_VERSION: !Ref WebVersion

  CrResultFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: elixir-drop-cr-results
      Description: Stores normalized Clash Royale player and Clan Wars clock results from the fixed-IP bridge
      Architectures:
        - arm64
      Runtime: nodejs24.x
      Handler: handler.crResultHandler
      Role: !GetAtt ApiRole.Arn
      MemorySize: 256
      Timeout: 20
      ReservedConcurrentExecutions: 5
      LoggingConfig:
        ApplicationLogLevel: INFO
        LogFormat: JSON
        LogGroup: !Ref CrResultLogGroup
        SystemLogLevel: INFO
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          SESSION_SECRET: !Ref SessionSecret
          # The result consumer does not write referee evidence, but it calls the
          # shared getConfig(), which requires TELEMETRY_PEPPER. Present here only
          # to satisfy that shared config; still Lambda-only, never exported.
          TELEMETRY_PEPPER: !Ref TelemetryPepper
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          APP_URL: !Ref AppUrl
          ELIXIR_DROP_EMAIL_FROM: !Ref EmailFrom
          ELIXIR_DROP_EMAIL_FROM_NAME: Elixir Drop
          NAME_MODEL_ID: !Ref NameModelId
          ELIXIR_DROP_DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          CR_REQUEST_QUEUE_URL: !Ref CrRequestQueue

  MailCanaryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: elixir-drop-mail-canary
      Description: Submits a daily email through the player magic-link delivery path
      Architectures:
        - arm64
      Runtime: nodejs24.x
      Handler: handler.mailCanaryHandler
      Role: !GetAtt MailCanaryRole.Arn
      MemorySize: 256
      Timeout: 20
      ReservedConcurrentExecutions: 1
      LoggingConfig:
        ApplicationLogLevel: INFO
        LogFormat: JSON
        LogGroup: !Ref MailCanaryLogGroup
        SystemLogLevel: INFO
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          ELIXIR_DROP_EMAIL_FROM: !Ref EmailFrom
          ELIXIR_DROP_EMAIL_FROM_NAME: Elixir Drop
          ELIXIR_DROP_CANARY_EMAIL: !Ref MailCanaryEmail

  MailCanarySchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Submit one Elixir Drop email delivery canary each day
      ScheduleExpression: cron(0 13 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt MailCanaryFunction.Arn
          Id: elixir-drop-mail-canary
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600
            MaximumRetryAttempts: 2

  MailCanaryInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MailCanaryFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MailCanarySchedule.Arn

  CrResultEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt CrResultQueue.Arn
      FunctionName: !Ref CrResultFunction
      BatchSize: 10
      FunctionResponseTypes:
        - ReportBatchItemFailures

  EstimatedChargesAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-estimated-charges
      AlarmDescription: >-
        Account-wide estimated AWS charges passed the monthly comfort ceiling.
        Requires billing alerts to be enabled once in the account (Billing
        preferences → Receive CloudWatch billing alerts); the metric only
        exists in us-east-1.
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  ApiFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-api-errors
      AlarmDescription: Elixir Drop API returned one or more HTTP 5xx responses.
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
        - Name: Stage
          Value: $default
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  ApiFunctionThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-api-throttles
      AlarmDescription: Elixir Drop API Lambda was throttled.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  MailCanaryErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-mail-canary-errors
      AlarmDescription: The daily Elixir Drop email delivery canary failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref MailCanaryFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  MailCanaryMissingAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-mail-canary-missing
      AlarmDescription: The scheduled Elixir Drop email delivery canary has not run for two days.
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref MailCanaryFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmTopic

  CrResultFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-cr-result-errors
      AlarmDescription: The Clash Royale result consumer returned one or more errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CrResultFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  CrRequestDeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-cr-request-dlq
      AlarmDescription: A Clash Royale player refresh request reached the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt CrRequestDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  CrResultDeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-cr-result-dlq
      AlarmDescription: A Clash Royale player or Clan Wars clock result reached the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt CrResultDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  CrBridgeBacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AlarmTopic
    Properties:
      AlarmName: elixir-drop-cr-bridge-backlog
      AlarmDescription: The fixed-IP bridge has not processed its oldest request within five minutes.
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt CrRequestQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  CrBridgeHeartbeatAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn:
      - AlarmTopic
      - CrBridgeHeartbeatPolicy
    Properties:
      AlarmName: elixir-drop-cr-bridge-heartbeat
      AlarmDescription: The fixed-IP bridge has stopped reporting its heartbeat.
      Namespace: ElixirDrop/CRBridge
      MetricName: Heartbeat
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmTopic

  CrWarClockHeartbeatAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn:
      - AlarmTopic
      - CrBridgeHeartbeatPolicy
    Properties:
      AlarmName: elixir-drop-cr-war-clock-heartbeat
      AlarmDescription: The fixed-IP bridge has not successfully relayed the Clan Wars clock for fifteen minutes.
      Namespace: ElixirDrop/CRBridge
      MetricName: WarClockHeartbeat
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmTopic

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: elixir-drop-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
        MaxAge: 86400

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: "2.0"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub integrations/${ApiIntegration}

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      # A hard ceiling on request volume: beta-scale traffic sits far below
      # this, and a script hammering the unauthenticated routes hits the
      # throttle instead of an unbounded Lambda + DynamoDB bill.
      DefaultRouteSettings:
        ThrottlingRateLimit: 50
        ThrottlingBurstLimit: 100

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

Outputs:
  ApiUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
  TableName:
    Value: !Ref DataTable
  FunctionName:
    Value: !Ref ApiFunction
  CrRequestQueueUrl:
    Value: !Ref CrRequestQueue
  CrResultQueueUrl:
    Value: !Ref CrResultQueue
  AlarmTopicArn:
    Value: !Ref AlarmTopic
  RefereeReadRoleArn:
    Value: !GetAtt RefereeReadRole.Arn
    Description: Bounded referee role for evidence reads and REFEREE# decision writes.
  LeaderboardMaintenanceRoleArn:
    Value: !GetAtt LeaderboardMaintenanceRole.Arn
    Description: Bounded role for sparse leaderboard projection repair.
