name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npx playwright install --with-deps chromium firefox webkit

      # Build reads only packages/game-data/cards.json — no API or mail tokens needed.
      - run: npm run verify

      - name: Deploy API
        run: npm run deploy:api
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ELIXIR_DROP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ELIXIR_DROP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.ELIXIR_DROP_AWS_REGION }}
          ELIXIR_DROP_CFN_ROLE_ARN: ${{ vars.ELIXIR_DROP_CFN_ROLE_ARN }}
          ELIXIR_DROP_CODE_BUCKET: ${{ vars.ELIXIR_DROP_CODE_BUCKET }}
          ELIXIR_DROP_STACK_NAME: ${{ vars.ELIXIR_DROP_STACK_NAME }}
          APP_URL: https://drop.poapkings.com
          # The API reports this so stale browser tabs can prompt a reload. It is
          # the same commit the web bundle is built from below (GITHUB_SHA), and
          # the front-end build id is its first 12 chars.
          WEB_VERSION: ${{ github.sha }}

      # The Fastmail token deliberately stays out of GitHub: the smoke script
      # reports its JMAP probe as "not checked" here, and the operator-side
      # `npm run check:beta` covers live mail verification from the fixed host.
      - name: Verify deployed API
        run: npm run smoke:api
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ELIXIR_DROP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ELIXIR_DROP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.ELIXIR_DROP_AWS_REGION }}
          ELIXIR_DROP_STACK_NAME: ${{ vars.ELIXIR_DROP_STACK_NAME }}

      # The API deploy writes api-config.json; rebuild so Pages contains the
      # endpoint emitted by the stack that was just promoted.
      - name: Build website with deployed API configuration
        run: npm run build --workspace=@elixir-drop/web

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed website
        run: |
          curl --fail --silent --show-error --retry 10 --retry-delay 3 https://drop.poapkings.com/ | grep -q "Elixir Drop"
          curl --fail --silent --show-error --retry 10 --retry-delay 3 https://drop.poapkings.com/api-config.json | grep -q "apiBaseUrl"
